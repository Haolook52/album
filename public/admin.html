<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相册管理后台</title>
  <style>
    *{box-sizing:border-box}
    body{max-width:600px;margin:40px auto;padding:0 20px;font-family:system-ui}
    .box{border:1px solid #ddd;padding:20px;border-radius:12px;background:white}
    h2{margin-bottom:20px}
    input{display:block;width:100%;margin:10px 0;padding:10px}
    button{background:#0070f3;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer}
    #msg{margin-top:10px;color:green}
    #imgs{margin-top:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    #imgs img{width:100%;height:100px;object-fit:cover;border-radius:6px}
  </style>
</head>
<body>
  <div class="box">
    <h2>上传图片到相册</h2>
    <input type="file" id="file" accept="image/*" multiple>
    <button onclick="upload()">上传</button>
    <div id="msg"></div>
    <div id="imgs"></div>
  </div>

  <script>
    async function loadImages(){
      const res = await fetch('/api/images');
      const imgs = await res.json();
      const div = document.getElementById('imgs');
      div.innerHTML = '';
      imgs.forEach(src=>{
        const img = document.createElement('img');
        img.src = src;
        div.appendChild(img);
      })
    }

    async function upload(){
      const file = document.getElementById('file').files[0];
      if(!file) return alert('选择图片');
      const form = new FormData();
      form.append('image', file);
      const res = await fetch('/api/upload', {method:'POST', body:form});
      const data = await res.json();
      document.getElementById('msg').innerText = '上传成功！';
      loadImages();
    }

    loadImages();
  </script>
</body>
</html>
